<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Mystery: Chapter 2 - Seeking the Truth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aspect-ratio-box { aspect-ratio: 16 / 9; }
        
        /* 統一的發光與微微放大動畫 (給小物件如門把、登記簿、水果籃使用) */
        @keyframes pulse-hover {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.4)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.4)); }
        }
        .interactive-item { position: absolute; cursor: pointer; transition: all 0.3s ease; }
        .interactive-item:hover { animation: pulse-hover 1.2s infinite ease-in-out; z-index: 10; }
        
        /* 減弱一半的發光與放大動畫 (專門給面積大的人物如兒子、醫生、護士、爸爸使用，視覺更穩定) */
        @keyframes mild-pulse-hover {
            0% { transform: scale(1); filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.2)); }
            50% { transform: scale(1.015); filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.2)); }
        }
        .mild-interactive-item { position: absolute; cursor: pointer; transition: all 0.3s ease; }
        .mild-interactive-item:hover { animation: mild-pulse-hover 1.2s infinite ease-in-out; z-index: 10; }
        
        .hidden-scene { opacity: 0; pointer-events: none; position: absolute; inset: 0; }
        .active-scene { opacity: 1; pointer-events: auto; position: absolute; inset: 0; }
        .fade-in { transition: opacity 1s ease-in-out; }

        @keyframes blink-border {
            0%, 100% { border-color: white; box-shadow: 0 0 10px white; background-color: rgba(255, 255, 255, 0.2); }
            50% { border-color: transparent; }
        }
        .blinking-input {
            position: absolute;
            border: 3px solid red;
            animation: blink-border 1.5s infinite;
            background: transparent;
            outline: none;
            z-index: 60;
            color: black;
            font-size: 1.2rem;
            text-align: center;
        }
        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.6)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 1)); opacity: 1; }
        }
        .arrow-glow { animation: glow-pulse 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-center p-4 select-none">

    <!-- 背景音樂播放器 (自動播放 & 循環) -->
    <audio id="bg-music" loop>
        <source src="Walen - Conspiracy Detective (freetouse.com).mp3" type="audio/mpeg">
    </audio>

    <div id="game-container" class="relative w-full max-w-5xl aspect-ratio-box bg-black shadow-2xl rounded-xl overflow-hidden border-4 border-gray-700">
        
        <!-- 場景 0：開始畫面 -->
        <div id="scene-start" class="active-scene bg-gray-800 flex flex-col items-center justify-center text-white z-50">
            <h1 class="text-5xl font-bold mb-4 tracking-widest text-red-400">The Price of Lies</h1>
            <h2 class="text-2xl mb-12 text-gray-300">Chapter 2: Accident and Truth</h2>
            <button onclick="startGame()" class="px-8 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-full transition transform scale-105 hover:scale-110 shadow-lg">Start Game</button>
        </div>

        <!-- 場景 1：警察來電 -->
        <div id="scene-phone" class="hidden-scene bg-gray-900 flex flex-col items-center justify-center z-40 relative">
            <div class="z-10 text-center">
                <div class="text-6xl mb-6">📱</div>
                <div id="phone-dialogue" class="text-2xl text-white font-semibold mb-8 max-w-2xl px-6 h-24"></div>
                <button id="btn-hospital" onclick="goToHospital()" class="hidden px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg">Rush to Hospital Immediately</button>
            </div>
        </div>

        <!-- 場景 2：醫院登記處 -->
        <div id="scene-hospital" class="hidden-scene z-30 bg-black">
            <img id="hospital-bg" src="https://assets.codepen.io/17688442/scene+1-Registration+Desk.png" alt="Hospital Registration Desk" class="w-full h-full object-cover">
            
            <!-- 護士去背疊加圖層 (使用溫和閃爍 mild-interactive-item) -->
            <img src="https://assets.codepen.io/17688442/1a.png" 
                 id="item-interactive-nurse"
                 class="mild-interactive-item hidden"
                 style="left: 22.3%; top: 0.855%; width: 54.5%; z-index: 25; transform-origin: center center;"
                 alt="Interactive Nurse"
                 title="與護士交談"
                 onclick="startNurseDialogue()">

            <!-- 登記簿 (小物件，使用 pulse-hover) -->
            <img src="https://assets.codepen.io/17688442/Visitor+log+book-png.png" 
                 id="item-logbook"
                 class="interactive-item" 
                 style="left: 46%; top: 73%; width: 19%; z-index: 30; transform-origin: center center;"
                 alt="Visitor Log Book"
                 title="Click to examine"
                 onclick="openLogBook()"
                 onerror="this.src='https://placehold.co/300x200/34495e/ecf0f1?text=Log+Book'">

            <button id="btn-return-doctor" class="hidden absolute left-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="goToDoctorFromHospital()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
        </div>

        <!-- 彈出視窗：顯示登記簿圖片 -->
        <div id="modal-logbook" class="hidden absolute inset-0 bg-black bg-opacity-90 z-50 flex items-center justify-center p-4">
            <div class="w-full max-w-4xl h-5/6 relative flex justify-center">
                <img src="https://assets.codepen.io/17688442/visitor+book+%E5%86%85%E9%A0%81%E8%A8%AD%E8%A8%88.jpeg" alt="Visitor Log Details" class="h-full w-auto object-contain border-4 border-white relative">
                
                <div class="absolute inset-0 pointer-events-none" style="max-width: 100%; height: 100%;">
                    <input type="text" id="input-h42" class="blinking-input pointer-events-auto" style="top: 76.38%; left: 34.46%; width: 6%; height: 7%;">
                    <input type="text" id="input-ruth" class="blinking-input pointer-events-auto" style="top: 76.05%; left: 61.75%; width: 8.3%; height: 7%;">
                </div>
                
                <button id="btn-submit-logbook" onclick="checkAnswers()" class="absolute -bottom-16 left-1/2 transform -translate-x-1/2 px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg text-xl border-2 border-white">
                    Hand in to nurse
                </button>

                <button onclick="closeLogBook()" class="absolute -top-12 right-0 text-white font-bold text-4xl hover:text-red-400">&times;</button>
            </div>
        </div>

        <!-- 場景 3：病房內 -->
        <div id="scene-ward" class="hidden-scene z-30 bg-black">
            <img src="https://assets.codepen.io/17688442/dad.jpeg" alt="Evelyn in Hospital Bed" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://placehold.co/1024x576/2c3e50/ecf0f1?text=Scene+3:+Ward'">

            <!-- 爸爸人物圖層 (溫和閃爍) -->
            <img src="https://assets.codepen.io/17688442/dad+only.png" 
                 id="item-dad"
                 class="mild-interactive-item"
                 style="left: 24.5%; top: 32.25%; width: 24%; z-index: 40; transform-origin: center center;"
                 alt="Interactive Dad"
                 title="點擊與爸爸對話"
                 onclick="showDadMessage()">

            <!-- 水果籃 (小物件，普通閃爍) -->
            <img src="https://assets.codepen.io/17688442/fruit.png" 
                 id="item-fruit"
                 class="interactive-item"
                 style="left: 68.25%; top: 42.75%; width: 14.5%; z-index: 40; transform-origin: center center;"
                 alt="Fruit Basket"
                 title="Click to examine"
                 onclick="showFruitMessage()">

            <!-- 左邊箭頭：前往兒子角落 -->
            <button class="absolute left-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="goToSon()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            
            <!-- 右邊箭頭：前往醫生房間 -->
            <button class="absolute right-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="goToDoctor()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <!-- 場景 5：兒子角落 (Son Scene) -->
        <div id="scene-son" class="hidden-scene z-30 bg-black">
            <img src="https://assets.codepen.io/17688442/son+scene.jpeg" alt="Toby in Hospital Hallway Corner" class="w-full h-full object-cover">
            
            <!-- 兒子 Toby 人物圖層 (溫和閃爍) -->
            <img src="https://assets.codepen.io/17688442/son+only.png" 
                 id="item-son" 
                 class="mild-interactive-item" 
                 style="left: 6.75%; top: 38.5%; width: 25%; height: auto; z-index: 40; transform-origin: center center;"
                 alt="Interactive Toby"
                 title="點擊與 Toby 對話"
                 onclick="startSonDialogue()">

            <button class="absolute left-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="showLockedMessage()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <button class="absolute right-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="backToWardFromSon()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <!-- 場景 4：醫生房間 -->
        <div id="scene-doctor" class="hidden-scene z-30 bg-black">
            <img src="https://assets.codepen.io/17688442/doctor+whole.jpeg" alt="Doctor Room Background" class="w-full h-full object-cover">
            
            <!-- 醫生人物圖層 (溫和閃爍) -->
            <img src="https://assets.codepen.io/17688442/doctor+only.png" 
                 id="item-doctor"
                 class="mild-interactive-item"
                 style="left: 39.4%; top: 12.3%; width: 31%; z-index: 40; transform-origin: center center;"
                 alt="Interactive Doctor"
                 title="點擊與醫生對話"
                 onclick="startDoctorDialogue()">

            <!-- 門把手 (普通閃爍) -->
            <img src="https://assets.codepen.io/17688442/door+button.png" 
                 id="item-doorknob"
                 class="interactive-item"
                 style="left: 88.3%; top: 57.1%; width: 6.2%; z-index: 50; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));"
                 alt="Door Knob"
                 title="點擊離開"
                 onclick="backToHospitalFromDoctor()">

            <button class="absolute left-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="backToWardFromDoctor()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
        </div>
        
        <div id="fade-overlay" class="absolute inset-0 bg-black z-[100] opacity-0 pointer-events-none transition-opacity duration-1000"></div>
    </div>

    <!-- 整合式動態故事對話對話框 -->
    <div id="nurse-speech" class="hidden fade-in mt-6 p-6 bg-gray-800 w-full max-w-5xl rounded-xl border-2 border-gray-500 shadow-lg flex flex-col space-y-4">
        <div class="flex items-start space-x-4">
            <div id="speech-avatar" class="w-14 h-14 rounded-full border-2 border-gray-400 bg-gray-700 flex-shrink-0 flex items-center justify-center text-2xl">👩‍⚕️</div>
            <div class="flex-1">
                <p id="speech-speaker" class="text-blue-300 font-bold text-lg mb-1">Nurse Sarah :</p>
                <p id="nurse-dialogue-text" class="text-xl text-gray-100 font-semibold min-h-[30px]"></p>
                
                <div id="dialogue-options" class="hidden mt-4 flex flex-col space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        function switchScene(hideId, showId) {
            document.getElementById(hideId).classList.replace('active-scene', 'hidden-scene');
            document.getElementById(showId).classList.replace('hidden-scene', 'active-scene');
        }
        
        function startGame() { switchScene('scene-start', 'scene-phone'); playPhoneEvent(); }
        
        function playPhoneEvent() {
            const dialogueEl = document.getElementById('phone-dialogue');
            const texts = ["Hello, is this Ruth Winter? Mother of Evelyn Anderson?", "This is the Police. Your daughter had a severe car accident.", "Please come to the hospital immediately!"];
            let step = 0;
            function next() {
                if(step < texts.length) { dialogueEl.innerHTML = texts[step++]; setTimeout(next, 2500); }
                else { document.getElementById('btn-hospital').classList.remove('hidden'); }
            }
            next();
        }

        // 玩家點擊急奔醫院按鈕，安全播放背景音樂並切換場景
        function goToHospital() {
            // 背景音樂控制：玩家行為觸發，安全啟動
            const bgMusic = document.getElementById('bg-music');
            if (bgMusic) {
                bgMusic.volume = 0.2;
                bgMusic.play().catch(error => {
                    console.log("Background music autoplay was prevented:", error);
                });
            }

            switchScene('scene-phone', 'scene-hospital');
            const speechBox = document.getElementById('nurse-speech');
            speechBox.classList.remove('hidden');
            
            document.getElementById('speech-avatar').innerText = "👩‍⚕️";
            document.getElementById('speech-speaker').innerText = "Nurse Sarah :";
            document.getElementById('speech-speaker').className = "text-blue-300 font-bold text-lg mb-1";
            hideOptions();

            typeWriterStart("All visitors are required to sign in. Could you fill this out, please?");
            startBlinking();
            resetLogbook(); 
        }

        let nurseText = "";
        let typeIndex = 0;
        let typeTimer;
        let isLogbookLocked = false; 
        let onTypewriterComplete = null;

        function typeWriterStart(text, callback = null) {
            clearTimeout(typeTimer);
            if (text) nurseText = text;
            document.getElementById('nurse-dialogue-text').innerHTML = "";
            typeIndex = 0;
            onTypewriterComplete = callback;
            typeWriter();
        }

        function typeWriter() {
            if (typeIndex < nurseText.length) {
                document.getElementById('nurse-dialogue-text').innerHTML += nurseText.charAt(typeIndex);
                typeIndex++;
                typeTimer = setTimeout(typeWriter, 35); 
            } else if (onTypewriterComplete) {
                onTypewriterComplete();
                onTypewriterComplete = null;
            }
        }

        /* 護士對話 */
        function startNurseDialogue() {
            const speechBox = document.getElementById('nurse-speech');
            speechBox.classList.remove('hidden');
            
            document.getElementById('speech-avatar').innerText = "👩‍⚕️";
            document.getElementById('speech-speaker').innerText = "Nurse Sarah :";
            document.getElementById('speech-speaker').className = "text-blue-300 font-bold text-lg mb-1";
            
            hideOptions(); 
            
            typeWriterStart("Hello. How can I help you?", () => {
                showOptions([
                    { text: "Grandma: Can I take a look at the visitor log book?", action: dialogueTurn1 }
                ]);
            });
        }

        function dialogueTurn1() {
            hideOptions();
            typeWriterStart("Sure, go ahead.", () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Grandma: Thank you. Are there any other visitors here tonight?", action: dialogueTurn2 }
                    ]);
                }, 800);
            });
        }

        function dialogueTurn2() {
            hideOptions();
            typeWriterStart("No, not at all. Everyone entering or leaving must register here.", () => {
                showOptions([
                    { text: "Grandma: Is it always this quiet at night?", action: () => dialogueTurn3('A') },
                    { text: "Grandma: Are you sure no one else came by?", action: () => dialogueTurn3('B') }
                ]);
            });
        }

        function dialogueTurn3(choice) {
            hideOptions();
            if (choice === 'A') {
                typeWriterStart("Yes, it gets very lonely here after midnight. Most people are already asleep.", () => {
                    showOptions([{ text: "Grandma: Alright. I will just check the log book myself then.", action: dialogueTurn4 }]);
                });
            } else if (choice === 'B') {
                typeWriterStart("Positive. I have been at this desk all night, and nobody else has passed through.", () => {
                    showOptions([{ text: "Grandma: Alright. I will just check the log book myself then.", action: dialogueTurn4 }]);
                });
            }
        }

        function dialogueTurn4() {
            hideOptions();
            typeWriterStart("Please do. The book is right there. Let me know if you need anything else.");
        }

        /* 醫生分支對話 */
        function startDoctorDialogue() {
            const speechBox = document.getElementById('nurse-speech');
            speechBox.classList.remove('hidden');
            
            document.getElementById('speech-avatar').innerText = "👨‍⚕️";
            document.getElementById('speech-speaker').innerText = "Doctor Evans :";
            document.getElementById('speech-speaker').className = "text-emerald-400 font-bold text-lg mb-1";
            
            hideOptions();
            
            typeWriterStart("Hello. I need to ask you a question about Evelyn. Does she fall down often? Is she careless?", () => {
                showOptions([
                    { text: "Grandma: Why do you ask, Doctor? Is something wrong?", action: () => doctorTurn1('A') },
                    { text: "Grandma: I am not sure. Did you find something during the surgery?", action: () => doctorTurn1('B') }
                ]);
            });
        }

        function doctorTurn1(choice) {
            hideOptions();
            let responseText = "";
            if (choice === 'A') {
                responseText = "We found some small bruises on her body. They look older than the car accident.";
            } else if (choice === 'B') {
                responseText = "Yes. We noticed some older bruises on her arms. They happened before the crash.";
            }
            
            typeWriterStart(responseText, () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Grandma: I don't live with her, so I don't know much about her daily life.", action: () => doctorTurn2('A') },
                        { text: "Grandma: She did not tell me anything. But we do not live together.", action: () => doctorTurn2('B') }
                    ]);
                }, 800);
            });
        }

        function doctorTurn2(choice) {
            hideOptions();
            typeWriterStart("I see. But the shape of these bruises is strange. They do not look like normal injuries from falling down.", () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Grandma: Could it be a family health problem? Her father had a stroke and always lost his balance and fell.", action: () => doctorTurn3('A') },
                        { text: "Grandma: Did she faint before the crash? Her father had a stroke and often passed out suddenly.", action: () => doctorTurn3('B') }
                    ]);
                }, 800);
            });
        }

        function doctorTurn3(choice) {
            hideOptions();
            let responseText = "";
            if (choice === 'A') {
                responseText = "That is possible. But when people lose their balance, they usually hurt their knees or hands. Evelyn's bruises are on her upper arms and shoulders.";
            } else if (choice === 'B') {
                responseText = "If she passed out, she would just fall flat on the floor. But these marks look more like pressure marks—like someone grabbed her—not a fall.";
            }
            
            typeWriterStart(responseText, () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Grandma: Please, Doctor, check her again very carefully. We need to be sure.", action: () => doctorTurn4('A') },
                        { text: "Grandma: Please do a full checkup on her. I want to know the truth.", action: () => doctorTurn4('B') }
                    ]);
                }, 800);
            });
        }

        function doctorTurn4(choice) {
            hideOptions();
            typeWriterStart("I will check her again very carefully. But ma'am... if these marks are not from simple falls, it could be a very different story. Let's wait for her to wake up first.", () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Close", action: () => {
                            hideOptions();
                            document.getElementById('nurse-speech').classList.add('hidden');
                        }}
                    ]);
                }, 1000);
            });
        }

        /* 爸爸分支對話 */
        function showDadMessage() {
            const speechBox = document.getElementById('nurse-speech');
            speechBox.classList.remove('hidden');
            
            document.getElementById('speech-avatar').innerText = "👨";
            document.getElementById('speech-speaker').innerText = "Dad :";
            document.getElementById('speech-speaker').className = "text-amber-400 font-bold text-lg mb-1";
            
            hideOptions();
            typeWriterStart("(Dad is sitting by the bed, looking exhausted and heartbroken.)", () => {
                showOptions([
                    { text: "Grandma: Thank goodness the surgery is finally over... Is she still asleep from the medicine?", action: () => dadTurn1('A') },
                    { text: "Grandma: Seeing her lying there covered in all these injuries breaks my heart... How on earth did this happen?", action: () => dadTurn1('B') }
                ]);
            });
        }

        function dadTurn1(choice) {
            hideOptions();
            let responseText = "";
            if (choice === 'A') {
                responseText = "The doctor said the surgery was a success, and now we just have to wait for her to wake up... But seeing her like this, it truly cuts me to the heart.";
            } else if (choice === 'B') {
                responseText = "It's all my fault... I'm so sorry, Mom, for putting you through this. Looking at her lying there, I wish it were me instead.";
            }
            
            typeWriterStart(responseText, () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Grandma: I just don't understand. Why would Evelyn drive out all by herself so late at night?", action: () => dadTurn2('A') },
                        { text: "Grandma: The police mentioned that the accident site wasn't even on her usual route home. Where could she possibly be going at that hour?", action: () => dadTurn2('B') }
                    ]);
                }, 800);
            });
        }

        function dadTurn2(choice) {
            hideOptions();
            typeWriterStart("I... I really don't know. I was working late at the office and completely lost track of time. By the time I got the call, the crash had already happened. I regret it so much. If only I hadn't been working overtime... if only I had stayed home to keep her company, maybe none of this would have happened.", () => {
                setTimeout(() => {
                    showOptions([
                        { text: "Grandma: You were just working hard for this family. It's normal to work overtime sometimes, don't blame yourself too much.", action: () => dadTurn3('A') },

                    ]);
                }, 800);
            });
        }

        function dadTurn3(choice) {
            hideOptions();
            let responseText = "";
            if (choice === 'A') {
                responseText = "But Mom... it's exactly because I'm always working overtime, spending all my time on work, that I neglected her feelings... I really haven't been a good husband.";
            } else if (choice === 'B') {
                responseText = "No, not at all. We’ve been great. Maybe... maybe I've just been working too much overtime lately, and she was overthinking things alone at home. She probably just went for a drive to clear her head.";

            typeWriterStart(responseText, () => {

                    showOptions([
                        { text: "Close", action: () => {

        /* 兒子 Toby 對話 */
        function startSonDialogue() {

                    showOptions([

        function showOptions(optionsArray) {
            const container = document.getElementById('dialogue-options');
            container.innerHTML = ''; 
            optionsArray.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "text-left px-5 py-3 bg-gray-700 hover:bg-gray-600 text-gray-100 font-semibold rounded-lg border-2 border-gray-500 transition-colors shadow-md";
                btn.innerText = opt.text;
                btn.onclick = opt.action;
                container.appendChild(btn);
            });
            container.classList.remove('hidden');
        }

        function hideOptions() {
            document.getElementById('dialogue-options').classList.add('hidden');
        }

        function resetLogbook() {
            const logbookItem = document.getElementById('item-logbook');
            if (logbookItem) {
                if (!logbookItem.classList.contains('interactive-item')) {
                    logbookItem.classList.add('interactive-item');
                }
                logbookItem.style.pointerEvents = 'auto'; 
            }
        }

        const imgOpen = "https://assets.codepen.io/17688442/scene+1-Registration+Desk.png";
        const imgHalf = "https://assets.codepen.io/17688442/scene+1b-Registration+Desk.png";
        const imgClosed = "https://assets.codepen.io/17688442/scene+1c-Registration+Desk.png";

        const intNurseOpen = "https://assets.codepen.io/17688442/1a.png";
        const intNurseHalf = "https://assets.codepen.io/17688442/1b.png";
        const intNurseClosed = "https://assets.codepen.io/17688442/1c.png";
        
        [imgOpen, imgHalf, imgClosed, intNurseOpen, intNurseHalf, intNurseClosed].forEach(src => {
            const img = new Image();
            img.src = src;
        });

        let blinkTimer;
        function startBlinking() {
            if (blinkTimer) clearInterval(blinkTimer);
            blinkTimer = setInterval(() => {
                const bg = document.getElementById('hospital-bg');
                const intNurse = document.getElementById('item-interactive-nurse');
                
                if (bg) {
                    setTimeout(() => bg.src = imgHalf, 60);
                    setTimeout(() => bg.src = imgClosed, 120);
                    setTimeout(() => bg.src = imgHalf, 180);
                    setTimeout(() => bg.src = imgOpen, 240);
                }

                if (intNurse && !intNurse.classList.contains('hidden')) {
                    setTimeout(() => intNurse.src = intNurseHalf, 60);
                    setTimeout(() => intNurse.src = intNurseClosed, 120);
                    setTimeout(() => intNurse.src = intNurseHalf, 180);
                    setTimeout(() => intNurse.src = intNurseOpen, 240);
                }
            }, 3500); 
        }

        function stopBlinking() {
            if (blinkTimer) clearInterval(blinkTimer);
        }

        function transitionToWard() {
            stopBlinking();
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('opacity-0');
            fadeOverlay.classList.add('opacity-100');
            setTimeout(() => {
                switchScene('scene-hospital', 'scene-ward');
                document.getElementById('nurse-speech').classList.add('hidden');
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

            document.getElementById('nurse-speech').classList.add('hidden');

                document.getElementById('btn-return-doctor').classList.remove('hidden');
                document.getElementById('item-interactive-nurse').classList.remove('hidden');
                
                startBlinking();

                fadeOverlay.classList.remove('opacity-100');

            document.getElementById('nurse-speech').classList.add('hidden');

            setTimeout(() => {
                switchScene('scene-hospital', 'scene-doctor');
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

        function checkAnswers() {
            const wardInput = document.getElementById('input-h42').value.trim().toLowerCase();
            const relInput = document.getElementById('input-ruth').value.trim().toLowerCase();

            const isWardCorrect = (wardInput === 'h18');
            const isRelCorrect = (['mother', 'mum', 'mom'].includes(relInput));

            if (isWardCorrect && isRelCorrect) {
                isLogbookLocked = true; 
                typeWriterStart("Thank you. You may come in.");
                closeLogBook(); 
                
                const logbookItem = document.getElementById('item-logbook');
                logbookItem.classList.remove('interactive-item'); 
                logbookItem.style.pointerEvents = 'none'; 
                
                setTimeout(transitionToWard, 3000);
                
            } else {
                typeWriterStart("Please make sure the information is correct.");
            }
        }

        function openLogBook() { 
            document.getElementById('modal-logbook').classList.remove('hidden'); 
            
            if (isLogbookLocked) {
                const inputH42 = document.getElementById('input-h42');
                const inputRuth = document.getElementById('input-ruth');
                
                inputH42.readOnly = true;
                inputRuth.readOnly = true;
                
                inputH42.style.animation = 'none';
                inputH42.style.border = 'none';
                inputRuth.style.animation = 'none';
                inputRuth.style.border = 'none';
                
                document.getElementById('btn-submit-logbook').classList.add('hidden');
            }
        }
        function closeLogBook() { document.getElementById('modal-logbook').classList.add('hidden'); }
    </script>
