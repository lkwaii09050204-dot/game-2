<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Mystery: Chapter 2 - Seeking the Truth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .aspect-ratio-box { aspect-ratio: 16 / 9; }
        @keyframes pulse-hover {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 12px rgba(255, 255, 255, 1)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.5)); }
        }
        .interactive-item { position: absolute; cursor: pointer; transition: all 0.3s ease; }
        .interactive-item:hover { animation: pulse-hover 1.2s infinite ease-in-out; z-index: 10; }
        .hidden-scene { opacity: 0; pointer-events: none; position: absolute; inset: 0; }
        .active-scene { opacity: 1; pointer-events: auto; position: absolute; inset: 0; }
        .fade-in { transition: opacity 1s ease-in-out; }

        /* 閃爍動畫 */
        @keyframes blink-border {
            0%, 100% { border-color: white; box-shadow: 0 0 10px white; background-color: rgba(255, 255, 255, 0.2); }
            50% { border-color: transparent; }
        }
        .blinking-input {
            position: absolute;
            border: 3px solid red;
            animation: blink-border 1.5s infinite;
            background: transparent;
            outline: none;
            z-index: 60;
            color: black;
            font-size: 1.2rem;
            text-align: center;
        }
      /* 箭頭發光動畫 */
        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.6)); opacity: 0.8; }
            50% { filter: drop-shadow(0 0 15px rgba(255, 255, 255, 1)); opacity: 1; }
        }
        .arrow-glow {
            animation: glow-pulse 2s infinite ease-in-out;
        }
      
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center justify-center p-4 select-none">

    <!-- 主遊戲容器 -->
    <div id="game-container" class="relative w-full max-w-5xl aspect-ratio-box bg-black shadow-2xl rounded-xl overflow-hidden border-4 border-gray-700">
        
        <!-- 場景 0：開始畫面 -->
        <div id="scene-start" class="active-scene bg-gray-800 flex flex-col items-center justify-center text-white z-50">
            <h1 class="text-5xl font-bold mb-4 tracking-widest text-red-400">The Price of Lies</h1>
            <h2 class="text-2xl mb-12 text-gray-300">Chapter 2: Accident and Truth</h2>
            <button onclick="startGame()" class="px-8 py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded-full transition transform hover:scale-105 shadow-lg">Start Game</button>
        </div>

        <!-- 場景 1：警察來電 -->
        <div id="scene-phone" class="hidden-scene bg-gray-900 flex flex-col items-center justify-center z-40 relative">
            <div class="z-10 text-center">
                <div class="text-6xl mb-6">📱</div>
                <div id="phone-dialogue" class="text-2xl text-white font-semibold mb-8 max-w-2xl px-6 h-24"></div>
                <button id="btn-hospital" onclick="goToHospital()" class="hidden px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg">Rush to Hospital Immediately</button>
            </div>
        </div>

        <!-- 場景 2：醫院登記處 -->
        <div id="scene-hospital" class="hidden-scene z-30 bg-black">
            <!-- 加入 ID 以便 JavaScript 切換圖片來產生眨眼效果 -->
            <img id="hospital-bg" src="https://assets.codepen.io/17688442/scene+1-Registration+Desk.png" alt="Hospital Registration Desk" class="w-full h-full object-cover">
            
            <img src="https://assets.codepen.io/17688442/Visitor+log+book-png.png" 
                 id="item-logbook"
                 class="interactive-item" 
                 style="left: 46%; top: 73%; width: 19%; transform-origin: center center;"
                 alt="Visitor Log Book"
                 title="Click to examine"
                 onclick="openLogBook()"
                 onerror="this.src='https://placehold.co/300x200/34495e/ecf0f1?text=Log+Book'">
        </div>

        <!-- 彈出視窗：顯示登記簿圖片 -->
        <div id="modal-logbook" class="hidden absolute inset-0 bg-black bg-opacity-90 z-50 flex items-center justify-center p-4">
            <div class="w-full max-w-4xl h-5/6 relative flex justify-center">
                <img src="https://assets.codepen.io/17688442/visitor+book+%E5%86%85%E9%A0%81%E8%A8%AD%E8%A8%88.jpeg" alt="Visitor Log Details" class="h-full w-auto object-contain border-4 border-white relative">
                
                <!-- 覆蓋在圖片上的輸入框與按鈕，根據圖片比例進行絕對定位 -->
                <div class="absolute inset-0 pointer-events-none" style="max-width: 100%; height: 100%;">
                    <!-- 這些百分比是基於包含圖片的容器 -->
                    <input type="text" id="input-h42" class="blinking-input pointer-events-auto" style="top: 76.38%; left: 34.46%; width: 6%; height: 7%;">
                    <input type="text" id="input-ruth" class="blinking-input pointer-events-auto" style="top: 76.05%; left: 61.75%; width: 8.3%; height: 7%;">
                </div>
                
                <!-- 提交給護士的按鈕 -->
                <button onclick="checkAnswers()" class="absolute -bottom-16 left-1/2 transform -translate-x-1/2 px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition shadow-lg text-xl border-2 border-white">
                    Hand in to nurse
                </button>

                <button onclick="closeLogBook()" class="absolute -top-12 right-0 text-white font-bold text-4xl hover:text-red-400">&times;</button>
            </div>
        </div>

        <!-- 場景 3：病房內 -->
        <div id="scene-ward" class="hidden-scene z-30 bg-black">
            <img src="https://assets.codepen.io/17688442/dad.jpeg" alt="Evelyn in Hospital Bed" class="w-full h-full object-cover" onerror="this.onerror=null; this.src='https://placehold.co/1024x576/2c3e50/ecf0f1?text=Scene+3:+Ward'">

            <img src="https://assets.codepen.io/17688442/fruit.png" 
                 id="item-fruit"
                 class="interactive-item"
                 style="left: 68.25%; top: 42.75%; width: 14.5%; transform-origin: center center;"
                 alt="Fruit Basket"
                 title="Click to examine"
                 onclick="alert('這籃水果看起來很新鮮，可能是給 Evelyn 的。')">

            <!-- 左邊箭頭：原本返回醫院大廳，現在暫時改為提示 -->
            <button class="absolute left-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="alert('此處即將開放新場景...')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            
            <!-- 右邊箭頭：前往醫生畫面 -->
            <button class="absolute right-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="goToDoctor()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>

        <!-- 場景 4：醫生房間 -->
        <div id="scene-doctor" class="hidden-scene z-30 bg-black">
            <img src="https://assets.codepen.io/17688442/doctor+whole.jpeg" alt="Doctor" class="w-full h-full object-cover">
            
            <!-- 可點擊的門把：現在點擊會返回醫院大廳並觸發護士眨眼 -->
            <img src="https://assets.codepen.io/17688442/door+button.png" 
                 id="item-doorknob"
                 class="interactive-item"
                 style="left: 88.3%; top: 57.1%; width: 6.2%; z-index: 50; filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));"
                 alt="Door Knob"
                 title="點擊離開"
                 onclick="backToHospitalFromDoctor()">

            <!-- 左邊箭頭：返回病房 -->
            <button class="absolute left-6 top-1/2 -translate-y-1/2 p-4 bg-black/30 hover:bg-black/50 rounded-full border border-white/30 text-white transition-all z-40 arrow-glow" 
                    onclick="backToWardFromDoctor()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
        </div>
        
        <!-- 轉場專用的全畫面黑幕 -->
        <div id="fade-overlay" class="absolute inset-0 bg-black z-[100] opacity-0 pointer-events-none transition-opacity duration-1000"></div>

    </div>

    <!-- 護士說話區域 -->
    <div id="nurse-speech" class="hidden fade-in mt-6 p-6 bg-gray-800 w-full max-w-5xl rounded-xl border-2 border-gray-500 shadow-lg flex items-start space-x-4">
        <div class="w-14 h-14 rounded-full border-2 border-gray-400 bg-gray-700 flex-shrink-0 flex items-center justify-center text-2xl">👩‍⚕️</div>
        <div>
            <p class="text-blue-300 font-bold text-lg mb-1">Nurse Sarah :</p>
            <p id="nurse-dialogue-text" class="text-xl text-gray-100 font-semibold min-h-[30px]"></p>
        </div>
    </div>

    <script>
        function switchScene(hideId, showId) {
            document.getElementById(hideId).classList.replace('active-scene', 'hidden-scene');
            document.getElementById(showId).classList.replace('hidden-scene', 'active-scene');
        }
        
        function startGame() { switchScene('scene-start', 'scene-phone'); playPhoneEvent(); }
        
        function playPhoneEvent() {
            const dialogueEl = document.getElementById('phone-dialogue');
            const texts = ["Hello, is this Ruth Winter? Mother of Evelyn Anderson?", "This is the Police. Your daughter had a severe car accident.", "Please come to the hospital immediately!"];
            let step = 0;
            function next() {
                if(step < texts.length) { dialogueEl.innerHTML = texts[step++]; setTimeout(next, 2500); }
                else { document.getElementById('btn-hospital').classList.remove('hidden'); }
            }
            next();
        }

        /* 修復遺失的 goToHospital 函數 */
        function goToHospital() {
            switchScene('scene-phone', 'scene-hospital');
            const speechBox = document.getElementById('nurse-speech');
            speechBox.classList.remove('hidden');
            nurseText = "All visitors are required to sign in. Could you fill this out, please?";
            typeWriterStart();
            startBlinking();
        }

        /* 修復遺失的打字機與動畫變數 */
        let nurseText = "";
        let typeIndex = 0;
        let typeTimer;

        function typeWriterStart() {
            clearTimeout(typeTimer);
            document.getElementById('nurse-dialogue-text').innerHTML = "";
            typeIndex = 0;
            typeWriter();
        }

        function typeWriter() {
            if (typeIndex < nurseText.length) {
                document.getElementById('nurse-dialogue-text').innerHTML += nurseText.charAt(typeIndex);
                typeIndex++;
                typeTimer = setTimeout(typeWriter, 40);
            }
        }

        /* 修復遺失的護士眨眼系統 */
        const imgOpen = "https://assets.codepen.io/17688442/scene+1-Registration+Desk.png";
        const imgHalf = "https://assets.codepen.io/17688442/scene+1b-Registration+Desk.png";
        const imgClosed = "https://assets.codepen.io/17688442/scene+1c-Registration+Desk.png";
        
        [imgOpen, imgHalf, imgClosed].forEach(src => {
            const img = new Image();
            img.src = src;
        });

        let blinkTimer;
        function startBlinking() {
            if (blinkTimer) clearInterval(blinkTimer);
            blinkTimer = setInterval(() => {
                const bg = document.getElementById('hospital-bg');
                if (!bg) return;
                setTimeout(() => bg.src = imgHalf, 60);
                setTimeout(() => bg.src = imgClosed, 120);
                setTimeout(() => bg.src = imgHalf, 180);
                setTimeout(() => bg.src = imgOpen, 240);
            }, 3500); 
        }

        function stopBlinking() {
            if (blinkTimer) clearInterval(blinkTimer);
        }

        /* 修復遺失的轉場動畫與場景切換邏輯 */
        function transitionToWard() {
            stopBlinking();
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('opacity-0');
            fadeOverlay.classList.add('opacity-100');
            setTimeout(() => {
                switchScene('scene-hospital', 'scene-ward');
                document.getElementById('nurse-speech').classList.add('hidden');
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

        function goToDoctor() {
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('opacity-0');
            fadeOverlay.classList.add('opacity-100');
            setTimeout(() => {
                switchScene('scene-ward', 'scene-doctor');
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

        function backToWardFromDoctor() {
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('opacity-0');
            fadeOverlay.classList.add('opacity-100');
            setTimeout(() => {
                switchScene('scene-doctor', 'scene-ward');
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

        function backToHospital() {
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('opacity-0');
            fadeOverlay.classList.add('opacity-100');
            setTimeout(() => {
                switchScene('scene-ward', 'scene-hospital');
                startBlinking(); // 重新啟動護士的眨眼動畫
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

        function backToHospitalFromDoctor() {
            const fadeOverlay = document.getElementById('fade-overlay');
            fadeOverlay.classList.remove('opacity-0');
            fadeOverlay.classList.add('opacity-100');
            setTimeout(() => {
                // 切換回醫院大廳
                switchScene('scene-doctor', 'scene-hospital');
                startBlinking(); // 重新啟動護士的眨眼動畫
                fadeOverlay.classList.remove('opacity-100');
                fadeOverlay.classList.add('opacity-0');
            }, 1000);
        }

        // 驗證答案邏輯
        function checkAnswers() {
            const wardInput = document.getElementById('input-h42').value.trim().toLowerCase();
            const relInput = document.getElementById('input-ruth').value.trim().toLowerCase();

            const isWardCorrect = (wardInput === 'h18');
            const isRelCorrect = (['mother', 'mum', 'mom'].includes(relInput));

            if (isWardCorrect && isRelCorrect) {
                nurseText = "Thank you. You may come in.";
                typeWriterStart();
                closeLogBook(); // 答案正確，關閉登記簿
                
                // 停止桌上登記簿的閃爍與點擊效果
                const logbookItem = document.getElementById('item-logbook');
                logbookItem.classList.remove('interactive-item'); // 移除 hover 動畫和可點擊游標
                logbookItem.style.pointerEvents = 'none'; // 徹底停用點擊事件
                
                // 觸發轉場動畫 (等待 3 秒讓玩家看完護士的台詞)
                setTimeout(transitionToWard, 3000);
                
            } else {
                nurseText = "Please make sure the information is correct.";
                typeWriterStart(); // 答案錯誤，不關閉登記簿並更新對話
            }
        }

        function openLogBook() { document.getElementById('modal-logbook').classList.remove('hidden'); }
        function closeLogBook() { document.getElementById('modal-logbook').classList.add('hidden'); }
    </script>
</body>
</html>
